body:
  text: 補後漢書年表卷七宋熊方撰異姓諸侯西漢自新室凡一時封拜前表多黜而不書東漢自建安已來政出曹氏一時爵命亦非孝獻今將棄而不書則操非居攝故與新室異若將書之而紀傳或有闕文故下考於三國志以尚假漢朝名器雖為異代之史庶得其實耳號謚姓名始封侯狀子孫曽孫五世補後漢書年表卷七

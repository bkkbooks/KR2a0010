body:
  text: 補後漢書年表卷八宋熊方撰異姓諸侯號諡姓名始封侯狀子孫曽孫五世右孝獻侯者一百有四人關內一人隨祖見孝明異姓侯表郫江南亭二人隨祖見孝桓異姓侯表烏程一人隨父見孝靈異姓侯表臨淄宛魯陽譙西鄉𢎞農鄢陵贊襄邑夀春郿樊厯城平興安樂亭宣威廣昌亭萬歲亭洧陽亭閬中髙陵亭襄平永寧都亭二人列十三人凡三十有八人隨父溫西鄉鄧臨晉武德五人隨祖在本表凡一百五十有一人班固於楚漢未定之初作異姓諸侯王表東漢雖有王郎隗囂公孫述等然皆西漢之舊臣而僣竊擅權非若韓魏之國趙歇英布之輩故略而不表既作諸侯王表又分王子侯表蓋西漢之王者連城數十或戴黃屋東漢之王所食不及十一二僅與西漢之侯等至功臣外戚恩澤等侯以功者或親以恩者或功亦多互見而范曄書又有闕文今併其篇目槩曰同姓異姓侯表而各書其狀於始封之下則功恩自明矣補後漢書年表卷八
  hash: sha256:941e04201d8900cac01f5a1c62c7f2ce3a41c71277e129ac5a5098ecd9218209

body:
  text: 補後漢書年表卷一宋熊方撰同姓王矦表光武初興因西都疏爵之制封建宗室故齊武魯哀汝陰輩以功安成居巢甘里輩以親皆能乘時蹈運分茅胙土以為藩翼增壯中興至明章之世乃有東平東海與沛獻等各能謙抑令終為一代賢王其蹈憲網者雖或有之然無吳楚七國之勢光武之慮逺矣作同姓王矦表右光武二十有八人襄邑穀孰夀光趙蔡陽髙鄉堂溪淄川安城白牛成武順陽黃李齊北海沛東武城十有七人隨父印曲陽齊下博臨邑縣二人鄉三人凡十人隨祖在本表安衆二人海昏一人見前書王子矦表凡五十有八人補後漢書年表卷一
  hash: sha256:e1249cb073632f7133875ab46af9939c1312849b64ac2841f0bd87d6d05cd91c

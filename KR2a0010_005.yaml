body:
  text: 補後漢書年表卷五宋熊方撰異姓諸侯右孝明侯者五人淮陵髙密昌安夷安楊虛朗陵好畤鄳凡八人隨父車犬東武安平牟平阜成髙密膠東安豐原鹿銅陽濦強燕陽安新郪凡十有四人隨祖見光武異姓矦表凡二十有七人右孝章侯者六人膠東即墨順陽翟鄉許節鄉楊邑鄉凡七人隨父髙亭二人美陽平鄉安成平陽伊亭即墨凡八人隨祖見光武異姓侯表凡二十有一人右孝和侯者五人平夀關內褒親凡三人隨父阿陵美陽粟邑武始馬亭鄉冠軍郾汝陽夏陽樂平乘氏單父吳房平陽順陽翟鄉楊邑凡十有七人隨祖見光武異姓矦表關內一人隨祖見孝明異姓侯表定逺一人隨父在本表凡二十有七人右孝安侯者十有六人監亭蘆亭林慮平鄉平亭鬲夷安上蔡都鄉陽安舞陽安樂亭漻亭朗陵髙置亭原鹿燕潁陽合鄉曲平亭二人葉二人西平二人西華二人凡二十有七人隨祖見光武異姓侯表鄛鄉一人隨父見孝和異姓矦表安鄉龍鄉盛鄉長社縣列三人凡七人隨父見在本表凡五十有一人右孝順矦者二十有四人牟平陽亭征羌乘氏二人凡五人隨祖見光武異姓侯表舞陽一人隨祖見孝安異姓矦表宜城浮陽凡二人隨父見本表凡三十有二人右孝沖侯者三人補後漢書年表卷五

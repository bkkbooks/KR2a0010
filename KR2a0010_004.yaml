body:
  text: 補後漢書年表卷四宋熊方撰異姓諸侯右光武侯者一百有七人阿陵中水槐里昌城東光櫟陽雍奴洨安平隃麋牟平陽夏祁鄉廣平新蔡靈臺夀阜成鬲褒德西華吳房舞隂穀陽膠東祝阿安成建平參蘧合肥夜固始召陵陽安山桑慎昆陽陵陽武始不其則鄉全椒顯親陵鄉宣恩原鹿宣義征羌壽張射陽更父新郪發于關內二人凡五十有四人隨父濯陽築陽樂陵元鄉平望發干凡六人隨祖在本表平陽髙昌歸德二人凡四人見前書功臣侯表平昌周承休紅陽凡三人見前書恩澤侯表凡一百七十有四人補後漢書年表卷四

  text: 欽定四庫全書史部一
  hash: sha256:4fc343c1c4715a8de75d4eb74f65eae0b7a2d5b689508f203b2457159ed64a3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0010_WYG_000-1a, image: WYG0253/WYG0253-0735a.png}
body:
  text: 補後漢書年表正史類提要臣等謹案補後漢書年表十卷宋熊方撰方字廣居豐城人由上舍生官至右迪功郎權澧州司户參軍是書前有進表不著年月表中有皇帝陛下奮神武以撥亂致太平而中興仰稽聖功同符光武之語又有灑宸翰於九經永光庠序煥雲章於八法冠絶鍾王之語御書太學石經乃髙宗時事則方為南渡初人矣昔司馬遷作史記始立十表梁書王僧䖍傳稱其旁行斜上體仿周譜蓋三代之遺法也班固八表實沿其例范蔚宗作後漢書獨闕斯製遂使東京典故散綴于紀傳之內不能絲連繩貫開帙釐然方因作此編補所未備凡同姓侯王表二卷異姓諸侯表六卷百官表二卷其所證據一本范氏舊文義例則仿之前書而稍為通變如王子外戚恩澤諸侯表皆不復分晰惟各書其狀於始封之下而以功以親自可瞭如指掌又百官雖因西漢而廢置不一方取劉昭之志自太傅至河南尹凡二十有三等以繫于年而除拜薨免之實悉見其貫穿鉤考極為精詳綱目條章亦俱燦然有法惟中間端緒繁密故蹖駁之處亦間有之如海昏侯㑹邑安衆侯松其肇封固自西漢而前書皆云今見為侯則明章以後尚嗣封弗絶自應在東京列侯之數雖史文闕略不能得其傳世之詳亦當標其國號名屬而注云後闕始合史法方乃因其世系無徴遂黜其名僅以見前書王子侯表一語附識篇末審如是則城陽恭王祉亦見前書王子侯表何以此書又得載入乎此其為例不純者也又如伏完乃伏湛七世孫襲封不其侯見於湛傳及皇后紀者甚明惟袁宏漢紀有建安元年封董承伏完十三人為列侯之文范史誤採入本紀中方不加考辨於伏湛下既書侯完嗣爵而孝獻時諸侯表內又别出一列侯伏完殊為復舛又皇后紀稱完為屯騎校尉建安十四年卒子典嗣是曹操弒伏后時完已先卒故史但稱操殺后兄弟宗族而不及完方乃誤以為曹操所誅國除而于侯典一代竟不列入又如漢夀亭侯世但稱夀亭侯沿習舊訛未能糾正此其考核偶疏者也又漢制以太傅至將軍為五府自大將軍車騎將軍度遼將軍以外其餘雜將軍號隨時建置見於紀傳者尚多乃于百官表內概不之及頗傷闕漏此其採托之未備者也凡此數端皆為所短要其經緯周密叙次井然使讀者按部可稽深為有裨於史學豐城縣志稱方作是書自題其堂曰補史其深自矜重殆亦非徒然矣乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫純臣孫士毅總校官臣陸費墀進補後漢書年表序臣聞昔司馬遷班固之為史皆謹於表年從春秋之法大一統以明所授蓋天子之事也范蔚宗作東漢史僅畢紀傳而表志未立蕭梁時劉昭補注舊志又不及表殆非聖人所以辨正朔存褒貶之意史家大法於此隳廢且東漢之治凡一百九十五年前繼西京之盛而一代信史有不足於遷固稽之聖人垂戒大訓尚有遺闕甚非所以昭中興之偉績也臣今輒集補後漢年表十卷以足范劉之未備庶史冊之文稍全而繼體統元之旨自明聖人之制不泯也凡表之義例一據范劉舊文不敢復取他說以汨其傳至綱目條章稍倣前書其有闕疑則俟後之君子熊方序進補後漢書年表表臣聞明爻象彖之原乃可學易識風雅頌之旨始與言詩總之必有宗主之各有體臣方誠惶誠恐稽首頓首伏念臣迃疏蹇淺之末學竒窮艱苦之餘生荒松菊而出遊駐桑榆而筮仕考麟經雖曰聖作亦本舊文觀遷史素號良才悉因前筆裘非一腋流必有源臣不揆荒蕪深悼道闕惜東京之再造痛信史之未成范氏之製雖精俄乖素志劉昭之業未廣不及表年懼僞閏之不分嗟正朔之無統譬為山而或虧一簣效鍊石而欲補髙天人異而志同世殊而事合故束晳追為華黍小雅始全暨冬官取於考工周禮乃備恭惟皇帝陛下學由天縱道本生知智勇冠乎禹湯孝悌同於堯舜奮神武以撥亂致太平而中興仰稽聖功同符光武開獻書之路來上者汗馬牛廣祕府之藏所積者充棟宇加以睿文深略重道崇儒灑宸翰於九經永光庠序焕雲章於八法冠絶鍾王此又永平之日未聞兩漢之君希有兼容寸善博採遺文故兹衰􅉵一介之愚亦效涓塵萬分之助前賢後聖既功德之同流古史今文貴述作之一體焉能補衮第若續貂初或誚於祭魚終亦憂其覆瓿求義例於班固不減前篇較興廢於西京豈慚後作史冊既全綱目漢功益更昭明歷晉魏隋唐非無大手何明章安順未列成書允逢我宋之右文獲繼先儒而儷美豈因人力蓋本天時臣謹集補後漢年表十卷隨表投進以聞臣方誠惶誠恐稽首頓首謹言臣聞班固前漢書為表有八其七為年表其一為古今人表及考其書自伏犧氏至司馬欣自聖人至愚人凡九等原班固之意自秦以上則為古人自漢以下則為今人篇目雖曰古今人表然但及於古而不及於今顔師古注云其書未畢考班固史作始於父彪固因父之筆未及成而卒餘八表及天文志及後漢和帝詔其女弟昭就東觀藏書閣踵而成之以是推之若固所著未畢則昭亦終之矣言未畢非也是師古未知其說臣按唐劉子元言作史有五不可曰史局深籍禁門所以杜顔面防請謁今作者如林儻示褒貶曾未絶口而朝野咸知孫盛取嫉權門王劭見讎貴族常人之情不能無畏此三不可也蓋班氏父子撰述之時前漢可書之人子孫雲仍與朋舊輩類往往具存茍人人而第之智愚一分得不羣起而讐之哉班氏所以不明今人而次於表者懼此故也然並曰古今人表而闕今人者其意以今人之表有俟後之人爾范蔚宗為後漢史又先書而殞使表志未立至劉昭補注諸家之志表又闕之則欲成此書當在今日臣遂集補年表十卷昨嘗投進未蒙指揮然視班固八表雖年表僅備而古今人表尚闕前書之表斷自於秦而漢初已來皆不與焉則欲補范書人表當以兩漢為目上考漢興下至魏初凡四百年間諸子百家與夫衆史記録搜討尋究非歲月可就臣按古有石渠東觀皆諸儒撰集之地而本朝亦命歐陽修宋祁輩修唐史至今學者傳誦臣又按劉子元為祕書少監時宰相蕭至忠領監修子元病意尚不一因為至忠言五不可有曰國之圖史皆出一家未聞藉功于衆今史司取士溢多人自為荀袁家自為政駿每記一事載一言閣筆相視含毫不斷頭白可期汗青無日一不可也竊見人之好尚自古不同唐之史臣已嘗病此臣所上年表皆出臣愚見雖各有所依據亦虞有子元五不可之說則衆志紛紜難得歸一如使得成愚臣一家之學不惑於衆不勝幸甚臣不避斧鉞再詣天庭陳進伏望聖慈詳憫特降睿旨降付有司令諸儒倣班史撰著兩漢人表以補范史不足並臣前所上年表庶傳不朽以資後學謹録奏聞伏候敕旨欽定四庫全書補後漢書年表目録卷一同姓王矦卷二同姓王矦卷三異姓諸矦卷四異姓諸矦卷五異姓諸矦卷六異姓諸矦卷七異姓諸矦卷八異姓諸矦卷九上百官卷九下百官卷十上百官卷十下百官

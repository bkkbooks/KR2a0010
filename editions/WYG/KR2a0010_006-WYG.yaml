body:
  text: 補後漢書年表卷六宋熊方撰異姓諸侯號謚姓名始封侯狀子孫曾孫五世右孝桓侯者二十有七人門徳亭南鄉安陽南頓泚陽昆陽育陽安陽益陽亭襄邑城父潁陽潁隂西平凡十有四人隨祖見光武異姓侯表關内侯人隨祖見孝和異姓侯表廚亭費亭宣父凡三人隨父在本表凡四十有五人右孝靈侯者四十人渭陽一人隨父見孝桓異姓侯表育陽安陽華容慎順陽蔡陽凡六人隨父見本表凡四十有七人補後漢書年表卷六

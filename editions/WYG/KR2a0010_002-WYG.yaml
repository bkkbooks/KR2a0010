body:
  text: 補後漢書年表卷二宋熊方撰同姓王矦右孝明八人齊利都鄉北海縣二人鄉二人凡九人隨祖僮廣陵東海鄉三人縣二人凡八人隨父鄉三人隨叔父見光武王矦表凡二十有八人右孝章七人沛任城東平琅邪列二十三人鄉十二人凡三十九人隨父趙齊東平平望列二人亭十人凡十六人隨祖見光武王侯表凡六十有二人右孝和一人濟南中山西平昌阜陵二人鄉亭十二人列十八人三十有五人隨父趙北海沛任城濟南琅邪東海矜陽亭列二十九人縣二人亭七人凡四十有六人隨祖見光武王侯表陳梁陽都鄉新平周亭樂陽亭博平髙亭樂成二人常山二人鄉亭二人凡十有四人隨父見孝明王矦表千乘凡一人隨父見孝章王矦表凡九十有七人右孝安時趙朝陽沛任城阜陵中山琅邪東海北海二人列十二人鄉亭五人亭七人鄉四人凡三十有八人隨祖見光武王侯表陳彭城竹邑都鄉安鄉魯陽鄉樂成下邳安平凡九人隨父耕亭東安亭樂成梁陳二人凡六人隨祖見孝明王侯表清河濟北廣川鄉五人凡八人隨父樂安清河凡二人隨祖見孝章王矦表平原二人隨父見孝和王侯表凡六十有五人右孝順時齊沛東平阜陵中山琅邪樂成亭南鄉濟南二人鄉三人凡十有五人隨祖見光武王矦表列二人隨父下邳梁常山列二人亭二人鄉亭十五人凡二十有二人隨祖見孝明王矦表濟北河間解瀆亭亭十三人凡十有六人隨父清河河間濟北凡三人隨祖見孝章王侯表凡五十有六人右孝冲時彭城常山亭四人凡六人隨祖見孝明王矦表右孝質時亭一人隨祖見光武王侯表卞亭昭陽亭公梁亭蒲亭昌城亭梁父亭西安亭林亭凡八人隨祖見孝明王侯表亭一人隨祖見孝章王侯表凡十人右孝桓時趙沛任城東海阜陵二人凡六人隨祖見光武王侯表彭城安平梁常山凡四人隨祖見孝明王矦表勃海濟北河間凡三人隨祖甘陵一人隨父見孝章王侯表平原一人隨祖見孝和王侯表凡十有五人右孝靈時東平任城阜陵中山琅邪凡五人隨祖見光武王矦表下邳梁凡二人隨祖見孝明王侯表河間濟南甘陵二人凡四人隨祖見孝章王侯表凡十有一人右孝獻五人博陵琅邪東海汶陽陽都凡五人隨祖見光武王侯表彭城一人隨祖見孝明王侯表濟南一人隨祖見孝章王侯表凡十有二人𥙷後漢書年表巻二

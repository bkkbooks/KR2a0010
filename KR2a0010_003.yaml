body:
  text: 補後漢書年表卷三宋熊方撰異姓諸矦世祖倉卒擾攘之初亟侯諸將矣盖激礪磨淬亦事之常至起卓茂伏湛為三公剖符而封之功臣不假以權革西京之弊天下靡然以名節相先及叔季李膺范滂軰雖相枕就死而不悔曹操豺虎之姿猶懼孔融荀彧等終其身不敢為盜徳義之足以服人心也如此可不尚兹作異姓矦表補後漢書年表卷三
